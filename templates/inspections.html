{% extends 'base.html' %}

{% block title %}Inspections{% endblock %}

{% block content %}
<div class="inspection-section">
    <div class="list-toolbar">
        <h2 class="section-title">Inspections</h2>
        <a href="/inspection-Add" class="add-btn">
            <i class="fas fa-plus text-xs"></i> Add
        </a>
    </div>
    <div class="inspection-list" id="table"></div>
</div>

<script src="/static/js/table.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        generateTable(
            'HV-storage',
            'Inspection_Header',
            'table',
            ['title', 'date', 'description', 'image_url'],
            null,
            (record) => {
                if (record.inspection_id) {
                    localStorage.setItem('current_inspection_id', record.inspection_id);
                    window.location.href = '/inspection-Details';
                }
            }
        );
    });
</script>
{% endblock %}
