{% extends 'base.html' %}

{% block title %}Edit Inspection Details{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-card">
        <h2>Edit Inspection Detail</h2>

        <button type="button" class="delete-btn" onclick="confirmDelete()">
            <i class="fas fa-trash-alt text-xs"></i> Delete Detail
        </button>

        <form id="inspectionForm" method="POST" onsubmit="submitForm(event);" class="space-y-0">

            <div class="form-group">
                <label for="area">Area</label>
                <input type="text" id="area" name="area" required>
            </div>

            <div class="form-group">
                <label for="item">Item</label>
                <input type="text" id="item" name="item" required>
            </div>

            <div class="form-group">
                <div class="flex items-center gap-3">
                    <input type="checkbox" id="action_required" name="action_required" value="True" class="w-5 h-5 rounded accent-blue-600">
                    <label for="action_required" class="!mb-0 text-sm font-semibold text-slate-700 cursor-pointer">Action Required</label>
                </div>
            </div>

            <div class="form-group">
                <label for="consequence">Consequence</label>
                <select id="consequence" name="consequence">
                    <option value="1 - Low">1 - Low</option>
                    <option value="2 - Minor">2 - Minor</option>
                    <option value="3 - Moderate">3 - Moderate</option>
                    <option value="4 - Major">4 - Major</option>
                    <option value="5 - Critical">5 - Critical</option>
                </select>
            </div>

            <div class="form-group">
                <label for="probability">Probability</label>
                <select id="probability" name="probability">
                    <option value="A - Almost Certain">A - Almost Certain</option>
                    <option value="B - Likely">B - Likely</option>
                    <option value="C - Possible">C - Possible</option>
                    <option value="D - Unlikely">D - Unlikely</option>
                    <option value="E - Rare">E - Rare</option>
                </select>
            </div>

            <div class="form-group">
                <label for="time_ranking">Time Ranking</label>
                <input type="text" id="time_ranking" name="time_ranking">
            </div>

            <div class="form-group">
                <label for="unit">Unit</label>
                <input type="text" id="unit" name="unit">
            </div>

            <div class="form-group">
                <label for="observations">Observations</label>
                <textarea id="observations" name="observations" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label for="recommendations">Recommendations</label>
                <textarea id="recommendations" name="recommendations" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label for="picture">Update Picture</label>
                <input type="file" id="picture" name="picture" accept="image/*">
                <img id="picture-preview" class="img-preview" src="#" alt="Current image" style="display:none;">
            </div>

            <div class="form-group">
                <label for="picture_caption">Picture Caption</label>
                <input type="text" id="picture_caption" name="picture_caption">
            </div>

            <button type="submit" class="submit-btn">Update Detail</button>
        </form>
    </div>
</div>

<script src="/static/js/db.js"></script>
<script>
let change = false;

document.getElementById('picture').addEventListener('change', function(event) {
    const file = event.target.files[0];
    if (file) {
        change = true;
        const reader = new FileReader();
        reader.onload = e => {
            const preview = document.getElementById('picture-preview');
            preview.src = e.target.result;
            preview.style.display = 'block';
        };
        reader.readAsDataURL(file);
    }
});

const dbName = "HV-storage";
const inspectionStoreName = "Inspection_Details";

const populateForm = () => {
    const inspectionData = localStorage.getItem('edit_record');
    if (!inspectionData) return;
    const d = JSON.parse(inspectionData);
    document.getElementById('area').value = d.area || '';
    document.getElementById('item').value = d.item || '';
    document.getElementById('unit').value = d.unit || '';
    document.getElementById('observations').value = d.observations || '';
    document.getElementById('recommendations').value = d.recommendations || '';
    document.getElementById('picture_caption').value = d.picture_caption || '';
    document.getElementById('action_required').checked = d.action_required === true || d.action_required === "true" || d.action_required == 'Yes';
    document.getElementById('consequence').value = d.consequence || '';
    document.getElementById('time_ranking').value = d.time_ranking || '';
    document.getElementById('probability').value = d.probability || '';

    const imgEle = document.getElementById('picture-preview');
    if (d.image_url) {
        if (typeof d.image_url === 'string' && d.image_url.includes('https')) {
            imgEle.src = d.image_url;
            imgEle.style.display = 'block';
        } else {
            renderImageByImageId(d.image_url, imgEle);
            imgEle.style.display = 'block';
        }
    }
};

const getCurrentDateTime = () => {
    const now = new Date();
    return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
};

const submitForm = (event) => {
    event.preventDefault();
    const localData = JSON.parse(localStorage.getItem('edit_record'));
    const inspectionData = {
        detail_id: localData.detail_id,
        inspection_id: localData.inspection_id,
        area: document.getElementById('area').value,
        item: document.getElementById('item').value,
        action_required: document.getElementById('action_required').checked,
        consequence: document.getElementById('consequence').value,
        time_ranking: document.getElementById('time_ranking').value,
        probability: document.getElementById('probability').value,
        unit: document.getElementById('unit').value,
        observations: document.getElementById('observations').value,
        recommendations: document.getElementById('recommendations').value,
        picture_caption: document.getElementById('picture_caption').value,
        last_modified: getCurrentDateTime(),
    };

    if (change) {
        const newImage = document.getElementById('picture').files[0];
        const reader = new FileReader();
        reader.onloadend = function() {
            upsertDetailWithImage(inspectionStoreName, inspectionData, reader.result)
                .then(() => { alert('Updated successfully!'); window.location.href = "/inspection-Details"; })
                .catch(error => alert("Error saving: " + error));
        };
        reader.readAsArrayBuffer(newImage);
    } else {
        inspectionData.image_url = localData.image_url || '';
        upsertDetailWithImage(inspectionStoreName, inspectionData, null)
            .then(() => { alert('Updated successfully!'); window.location.href = "/inspection-Details"; })
            .catch(error => alert("Error saving: " + error));
    }
};

const upsertDetailWithImage = (storeName, record, imageBlob) => {
    return new Promise((resolve, reject) => {
        if (!db) return reject('Database is not open.');
        if (!record.detail_id) record.detail_id = crypto.randomUUID();
        const transaction = db.transaction(['Images', storeName], 'readwrite');
        const imagesStore = transaction.objectStore('Images');
        const dataStore = transaction.objectStore(storeName);
        const saveRecord = (finalRecord) => {
            const request = dataStore.put(finalRecord);
            request.onsuccess = () => resolve();
            request.onerror = evt => reject(evt.target.error);
        };
        try {
            if (imageBlob) {
                const imgReq = imagesStore.put({ blob: imageBlob, detail_id: record.detail_id });
                imgReq.onsuccess = evt => saveRecord({ ...record, image_url: evt.target.result });
                imgReq.onerror = evt => reject(evt.target.error);
            } else {
                saveRecord(record);
            }
        } catch (err) {
            transaction.abort();
            reject('Transaction error: ' + err);
        }
    });
};

const confirmDelete = () => {
    const confirmation = prompt("Type 'confirm' to permanently delete this record:");
    if (confirmation === 'confirm') {
        const detail_id = JSON.parse(localStorage.getItem('edit_record')).detail_id;
        deleteRecord(inspectionStoreName, detail_id)
            .then(() => { alert('Deleted!'); window.location.href = "/inspection-Details"; })
            .catch(err => alert('Failed to delete: ' + err));
    } else {
        alert('Invalid confirmation.');
    }
};

document.addEventListener('DOMContentLoaded', populateForm);
</script>
{% endblock %}
