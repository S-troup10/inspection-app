{% extends 'base.html' %}

{% block title %}Add Customer{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-card">
        <h2>Add Customer</h2>

        <form id="customerForm" method="POST" enctype="multipart/form-data">

            <div class="form-group">
                <label for="name">Customer Name</label>
                <input type="text" id="name" name="name" required placeholder="e.g. Acme Corp">
            </div>

            <div class="form-group">
                <label for="site">Customer Site</label>
                <input type="text" id="site" name="site" required placeholder="e.g. Main Warehouse">
            </div>

            <div class="form-group">
                <label for="risk_type">Risk Type</label>
                <select id="risk_type" name="risk_type" required>
                    <option value="" disabled selected>Select a risk type</option>
                    <option value="1">HV Engineers Standard</option>
                    <option value="2">Glencore Structural</option>
                    <option value="3">Glencore Non Structural</option>
                </select>
            </div>

            <div class="form-group">
                <label for="logo">Customer Logo</label>
                <input type="file" id="logo" name="logo" accept="image/*">
                <img id="logo-preview" class="img-preview" src="#" alt="Preview" style="display:none;">
            </div>

            <button type="submit" class="submit-btn">Add Customer</button>
        </form>
    </div>
</div>

<script src='/static/js/db.js'></script>
<script>
    document.getElementById('logo').addEventListener('change', function(event) {
        const file = event.target.files[0];
        const preview = document.getElementById('logo-preview');
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    });

    const getCurrentDateTime = () => {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
    };

    document.getElementById('customerForm').addEventListener('submit', function(event) {
        event.preventDefault();
        const name = document.getElementById('name').value;
        const site = document.getElementById('site').value;
        const logoFile = document.getElementById('logo').files[0];
        const risk_type = document.getElementById('risk_type').value;
        const last_modified = getCurrentDateTime();

        if (logoFile) {
            const reader = new FileReader();
            reader.onloadend = function() {
                saveCustomerData(name, site, reader.result, last_modified, risk_type);
            };
            reader.readAsArrayBuffer(logoFile);
        } else {
            saveCustomerData(name, site, null, last_modified, risk_type);
        }
    });

    function saveCustomerData(name, site, logoBlob, last_modified, risk_type) {
        const request = indexedDB.open("HV-storage", 1);
        request.onsuccess = function(event) {
            const customer = { name, site, risk_type, image_url: null, last_modified };
            insertDataWithImage("Customer", customer, logoBlob)
                .then(() => {
                    alert("Customer added successfully!");
                    window.location.href = "/customer";
                })
                .catch((error) => alert("Error adding customer: " + error));
        };
        request.onerror = () => alert("Error opening database.");
    }
</script>
{% endblock %}
