{% extends 'base.html' %}

{% block title %}Edit Customer{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-card">
        <h2>Edit Customer</h2>

        <button type="button" class="delete-btn" onclick="confirmDelete()">
            <i class="fas fa-trash-alt text-xs"></i> Delete Customer
        </button>

        <form id="editCustomerForm">
            <div class="form-group">
                <label for="name">Customer Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="site">Customer Site</label>
                <input type="text" id="site" name="site" required>
            </div>
            <div class="form-group">
                <label for="risk_type">Risk Type</label>
                <select id="risk_type" name="risk_type" required>
                    <option value="" disabled selected>Select a risk type</option>
                    <option value="1">HV Engineers Standard</option>
                    <option value="2">Glencore Structural</option>
                    <option value="3">Glencore Non Structural</option>
                </select>
            </div>

            <button type="submit" class="submit-btn">Save Changes</button>
        </form>
    </div>
</div>

<script src='/static/js/db.js'></script>
<script>
    const dbName = "HV-storage";
    const storeName = "Customer";

    function getCurrentDateTime() {
        return new Date().toISOString();
    }

    const customerData = JSON.parse(localStorage.getItem("edit_record"));
    if (customerData) {
        document.getElementById("name").value = customerData.name || "";
        document.getElementById("site").value = customerData.site || "";
        document.getElementById("risk_type").value = customerData.risk_type || "";
    }

    document.getElementById("editCustomerForm").addEventListener("submit", function (event) {
        event.preventDefault();
        const name = document.getElementById("name").value;
        const site = document.getElementById("site").value;
        const risk_type = document.getElementById("risk_type").value;

        if (!customerData) return alert("No customer record found to update.");

        const request = indexedDB.open(dbName, 1);
        request.onsuccess = function(event) {
            const db = event.target.result;
            const transaction = db.transaction(storeName, "readwrite");
            const store = transaction.objectStore(storeName);
            const getRequest = store.get(customerData.customer_id);
            getRequest.onsuccess = function(event) {
                const existing = event.target.result;
                if (existing) {
                    existing.name = name;
                    existing.site = site;
                    existing.risk_type = risk_type;
                    existing.last_modified = getCurrentDateTime();
                    const updateRequest = store.put(existing);
                    updateRequest.onsuccess = () => {
                        alert("Customer updated successfully!");
                        window.location.href = "/customer";
                    };
                } else {
                    alert("Customer not found.");
                }
            };
        };
    });

    const confirmDelete = () => {
        const confirmation = prompt("Deleting this customer will also permanently delete all associated inspections and data. Type 'confirm' to proceed:");
        if (confirmation === 'confirm') {
            const customer_id = JSON.parse(localStorage.getItem('edit_record')).customer_id;
            deleteRecord('Customer', customer_id)
                .then(() => {
                    alert('Record deleted successfully!');
                    window.location.href = "/customer";
                })
                .catch((err) => alert('Failed to delete record: ' + err));
        } else {
            alert('Invalid confirmation.');
        }
    };
</script>
{% endblock %}
