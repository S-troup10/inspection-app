{% extends 'base.html' %}

{% block title %}Add Inspection{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-card">
        <h2>Add Inspection</h2>

        <form id="inspectionForm" method="POST" enctype="multipart/form-data">

            <div class="form-group">
                <label for="customer">Customer</label>
                <select id="customer" name="customer" required>
                    <option value="" disabled selected>Loading customers...</option>
                </select>
            </div>

            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" required placeholder="e.g. Annual HV Inspection">
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="3" required placeholder="Brief description of the inspection..."></textarea>
            </div>

            <div class="form-group">
                <label for="summary">Summary</label>
                <textarea id="summary" name="summary" rows="3" required placeholder="Summary of findings..."></textarea>
            </div>

            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" required>
            </div>

            <div class="form-group">
                <label for="image">Site Image</label>
                <input type="file" id="image" name="image" accept="image/*">
                <img id="image-preview" class="img-preview" src="#" alt="Preview" style="display:none;">
            </div>

            <button type="submit" class="submit-btn">Save Inspection</button>
        </form>
    </div>
</div>

<script src='/static/js/db.js'></script>
<script>
    const populateCustomerDropdown = () => {
        const request = indexedDB.open("HV-storage", 1);
        request.onsuccess = function(event) {
            const db = event.target.result;
            const transaction = db.transaction("Customer", 'readonly');
            const store = transaction.objectStore("Customer");
            const dropdown = document.getElementById('customer');
            dropdown.innerHTML = '';
            const cursorRequest = store.openCursor();
            cursorRequest.onsuccess = function(event) {
                const cursor = event.target.result;
                if (cursor) {
                    const option = document.createElement('option');
                    option.value = cursor.value.customer_id;
                    option.textContent = cursor.value.name;
                    dropdown.appendChild(option);
                    cursor.continue();
                } else if (!dropdown.hasChildNodes()) {
                    const option = document.createElement('option');
                    option.disabled = true;
                    option.textContent = "No customers available";
                    dropdown.appendChild(option);
                }
            };
        };
    };

    document.addEventListener('DOMContentLoaded', () => {
        populateCustomerDropdown();
        document.getElementById('date').value = new Date().toISOString().split('T')[0];

        document.getElementById('image').addEventListener('change', function(event) {
            const file = event.target.files[0];
            const preview = document.getElementById('image-preview');
            if (file) {
                const reader = new FileReader();
                reader.onload = e => { preview.src = e.target.result; preview.style.display = 'block'; };
                reader.readAsDataURL(file);
            }
        });

        const getCurrentDateTime = () => {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
        };

        document.getElementById('inspectionForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const customer = document.getElementById('customer').value;
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const summary = document.getElementById('summary').value;
            const date = document.getElementById('date').value;
            const imageFile = document.getElementById('image').files[0];
            const last_modified = getCurrentDateTime();

            const inspection = { customer_id: customer, title, description, summary, date, image_url: null, last_modified };

            if (imageFile) {
                const reader = new FileReader();
                reader.onloadend = function() {
                    insertDataWithImage("Inspection_Header", inspection, reader.result)
                        .then(() => { alert("Inspection added successfully!"); window.location.href = "/inspections"; })
                        .catch(error => alert("Error adding inspection: " + error));
                };
                reader.readAsArrayBuffer(imageFile);
            } else {
                insertDataWithImage("Inspection_Header", inspection, null)
                    .then(() => { alert("Inspection added successfully!"); window.location.href = "/inspections"; })
                    .catch(error => alert("Error adding inspection: " + error));
            }
        });
    });
</script>
{% endblock %}
