{% extends 'base.html' %}

{% block title %}HV Engineers | Dashboard{% endblock %}

{% block content %}

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.0/sql-wasm.js"></script>

<div class="flex flex-col min-h-[calc(100vh-56px)] px-4 py-8">

    <!-- Sync button -->
    <div class="flex justify-end mb-6">
        <button id="sync-status" title="Tap to sync"
            class="flex items-center gap-2 px-3 py-1.5 bg-white border border-slate-200 rounded-full text-xs font-medium text-slate-500 shadow-sm hover:border-blue-300 hover:text-blue-600 active:scale-95 transition-all focus:outline-none">
            <i id="sync-icon" class="fas fa-sync-alt text-xs"></i>
            <span id="sync-label">Tap to sync</span>
        </button>
    </div>

    <!-- Branding -->
    <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl shadow-lg mb-4">
            <i class="fas fa-bolt text-white text-2xl"></i>
        </div>
        <h2 class="text-2xl font-bold text-slate-800">HV Engineers</h2>
        <p class="text-slate-500 text-sm mt-1">Inspection Management</p>
    </div>

    <!-- Action cards -->
    <div class="grid grid-cols-1 gap-4 max-w-sm mx-auto w-full sm:max-w-lg sm:grid-cols-3 sm:gap-5">

        <!-- Customer Details -->
        <a href="/customer"
            class="flex flex-row sm:flex-col items-center gap-4 sm:gap-3 bg-white p-5 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md hover:border-blue-100 active:scale-98 transition-all group">
            <div class="flex-shrink-0 w-12 h-12 sm:w-14 sm:h-14 bg-blue-50 group-hover:bg-blue-100 rounded-xl flex items-center justify-center transition-colors">
                <i class="fas fa-user-tie text-blue-600 text-xl sm:text-2xl"></i>
            </div>
            <div class="sm:text-center">
                <p class="text-sm font-bold text-slate-800">Customers</p>
                <p class="text-xs text-slate-400 mt-0.5">View & manage</p>
            </div>
            <i class="fas fa-chevron-right text-slate-300 text-xs ml-auto sm:hidden"></i>
        </a>

        <!-- Inspections -->
        <a href="/inspections"
            class="flex flex-row sm:flex-col items-center gap-4 sm:gap-3 bg-white p-5 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md hover:border-green-100 active:scale-98 transition-all group">
            <div class="flex-shrink-0 w-12 h-12 sm:w-14 sm:h-14 bg-green-50 group-hover:bg-green-100 rounded-xl flex items-center justify-center transition-colors">
                <i class="fas fa-clipboard-list text-green-600 text-xl sm:text-2xl"></i>
            </div>
            <div class="sm:text-center">
                <p class="text-sm font-bold text-slate-800">Inspections</p>
                <p class="text-xs text-slate-400 mt-0.5">View & manage</p>
            </div>
            <i class="fas fa-chevron-right text-slate-300 text-xs ml-auto sm:hidden"></i>
        </a>

        <!-- Print Reports -->
        <a href="/select-Inspections" id="print"
            class="flex flex-row sm:flex-col items-center gap-4 sm:gap-3 bg-white p-5 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md hover:border-purple-100 active:scale-98 transition-all group">
            <div class="flex-shrink-0 w-12 h-12 sm:w-14 sm:h-14 bg-purple-50 group-hover:bg-purple-100 rounded-xl flex items-center justify-center transition-colors">
                <i class="fas fa-file-pdf text-purple-600 text-xl sm:text-2xl"></i>
            </div>
            <div class="sm:text-center">
                <p class="text-sm font-bold text-slate-800">Print Reports</p>
                <p class="text-xs text-slate-400 mt-0.5">Generate PDF</p>
            </div>
            <i class="fas fa-chevron-right text-slate-300 text-xs ml-auto sm:hidden"></i>
        </a>

    </div>
</div>

<!-- Full-screen loading overlay -->
<div id="fullscreen-spinner" class="hidden fixed inset-0 bg-slate-900 bg-opacity-60 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl px-10 py-8 flex flex-col items-center gap-4 shadow-2xl">
        <div class="w-10 h-10 border-4 border-slate-200 border-t-blue-600 rounded-full animate-spin"></div>
        <p class="text-sm font-medium text-slate-600">Loading...</p>
    </div>
</div>

<script src="/static/js/db.js"></script>

<script>
    // Register service worker
    if ('serviceWorker' in navigator && navigator.onLine) {
        navigator.serviceWorker
            .register('/static/js/service-worker.js', { scope: '/' })
            .then(() => console.log("Service Worker Registered"))
            .catch((error) => console.error("Service Worker Registration Failed:", error));
    }

    document.getElementById('print').addEventListener('click', () => {
        document.getElementById('fullscreen-spinner').classList.remove('hidden');
    });

    // --- Manual sync ---
    let isSyncing = false;

    function setSyncStatus(status) {
        const icon = document.getElementById('sync-icon');
        const label = document.getElementById('sync-label');
        const btn = document.getElementById('sync-status');
        if (status === 'syncing') {
            icon.classList.add('animate-spin', 'text-blue-500');
            icon.classList.remove('text-green-500', 'text-red-500', 'text-slate-400');
            label.textContent = 'Syncing...';
        } else if (status === 'synced') {
            icon.classList.remove('animate-spin', 'text-blue-500', 'text-red-500', 'text-slate-400');
            icon.classList.add('text-green-500');
            label.textContent = 'Synced ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
        } else if (status === 'error') {
            icon.classList.remove('animate-spin', 'text-blue-500', 'text-green-500', 'text-slate-400');
            icon.classList.add('text-red-500');
            label.textContent = 'Sync failed';
        } else {
            icon.classList.remove('animate-spin', 'text-blue-500', 'text-green-500', 'text-red-500');
            icon.classList.add('text-slate-400');
            label.textContent = 'Tap to sync';
        }
    }

    setSyncStatus('idle');

    document.getElementById('sync-status').addEventListener('click', async () => {
        if (isSyncing) return;
        isSyncing = true;
        setSyncStatus('syncing');
        try {
            await full_sync();
            setSyncStatus('synced');
        } catch (err) {
            console.error('Sync failed:', err);
            setSyncStatus('error');
        } finally {
            isSyncing = false;
        }
    });

    function updatePrintStatus() {
        document.getElementById('print').classList.toggle('disabled', !navigator.onLine);
    }
    updatePrintStatus();
    window.addEventListener('online', updatePrintStatus);
    window.addEventListener('offline', updatePrintStatus);
</script>

{% endblock %}
