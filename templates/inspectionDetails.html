{% extends 'base.html' %}

{% block title %}Inspection Details{% endblock %}

{% block content %}
<div class="customer-section">
    <div class="list-toolbar">
        <h2 class="section-title">Inspection Details</h2>
        <a href="#" id="add-inspection-detail-btn" class="add-btn">
            <i class="fas fa-plus text-xs"></i> Add
        </a>
    </div>
    <div class="customer-list" id="table"></div>
</div>

<script src="/static/js/table.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const inspectionId = localStorage.getItem('current_inspection_id');
        if (inspectionId) {
            document.getElementById('add-inspection-detail-btn').href = '/inspectionDetails-Add';
            generateTable(
                'HV-storage',
                'Inspection_Details',
                'table',
                ['area', 'item', 'action_required', 'time_ranking', 'observations', 'recommendations', 'image_url'],
                { index: 'inspection_id', value: inspectionId }
            );
        } else {
            console.error('No inspection_id found in local storage.');
            alert('Inspection ID is missing. Please navigate back and select an inspection.');
            window.location.href = '/inspections';
        }
    });
</script>
{% endblock %}
