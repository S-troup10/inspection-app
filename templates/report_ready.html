{% extends "base.html" %}

{% block title %}Report Ready{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto mt-12 px-4">
    <div class="bg-white rounded-lg shadow-md border-l-4 border-green-500 p-8 text-center">
        <h2 class="text-4xl font-bold text-green-600 mb-4">Success!</h2>
        <p class="text-lg text-gray-700 mb-2">
            The inspection report has been sent to <strong class="text-green-600">{{ email }}</strong>.
        </p>
        <p class="text-sm text-gray-500 mb-8">The email may take up to 3 minutes to arrive.</p>
        <a href="/" class="inline-block px-8 py-3 bg-blue-600 text-white rounded-md font-semibold hover:bg-blue-700 transition duration-200">
            Back to Dashboard
        </a>
    </div>
</div>
{% endblock %}
