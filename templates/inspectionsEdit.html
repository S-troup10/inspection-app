{% extends 'base.html' %}

{% block title %}Edit Inspection{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Edit Inspection</h2>
    <button type="button" class="delete-btn" onclick="confirmDelete()">Delete</button>
    <form id="inspectionForm" method="POST">
        <!-- Customer Selection -->
        <div class="form-group">
            <label for="customer">Customer</label>
            <select id="customer" name="customer" required>
                <option value="" disabled selected>Loading customers...</option>
            </select>
        </div>

        <!-- Title Input -->
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" required>
        </div>

        <!-- Description Input -->
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="4" required></textarea>
        </div>

        <!-- Summary Input -->
        <div class="form-group">
            <label for="summary">Summary</label>
            <textarea id="summary" name="summary" rows="4" required></textarea>
        </div>

        <!-- Date Input -->
        <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date" name="date" required>
        </div>

 <div class="form-group">
    <label for="img">Image Upload</label>
    <input type="file" id="img" name="img" accept="image/*">
    <img id="prefil" style="max-width: 100%; margin-top: 10px;" alt="Preview">
</div>




        <button type="submit" class="submit-btn">Save Changes</button>
    </form>
</div>
<script src='/static/js/db.js'></script>

<script>
    let change = false;
    const dbName = "HV-storage";  // IndexedDB database name
    const customerStoreName = "Customer";  // Customer store name
    const inspectionStoreName = "Inspection_Header"; // Inspection store name

    document.getElementById('img').addEventListener('change', function(event) {
    const file = event.target.files[0];
    const preview = document.getElementById('prefil');

    if (file) {
        change = true;
        const reader = new FileReader();
        reader.onload = function(e) {
            preview.src = e.target.result;
        };
        reader.readAsDataURL(file);
    } else {
        preview.src = '';
    }
});


    // Function to fetch customers and inspection data
    const populateFormData = () => {
        const inspectionData = JSON.parse(localStorage.getItem('edit_record')) || {};
    
        // Populate the form fields with inspection data
        document.getElementById('title').value = inspectionData.title || '';
        document.getElementById('description').value = inspectionData.description || '';
        document.getElementById('summary').value = inspectionData.summary || '';
        document.getElementById('date').value = inspectionData.date || '';
        const imgEle = document.getElementById('prefil');
      if (inspectionData.image_url !== undefined && inspectionData.image_url !== null && inspectionData.image_url !== '') {

          if (typeof inspectionData.image_url === 'string' && inspectionData.image_url.includes('https')) {
              imgEle.src = inspectionData.image_url;
          } else{
              renderImageByImageId(inspectionData.image_url, imgEle);
          }
      }
      else {
        imgEle.alt = 'no image';
      }
            
        // Fetch customers from IndexedDB
        const request = indexedDB.open(dbName, 1);
        request.onsuccess = function(event) {
            const db = event.target.result;
            const transaction = db.transaction(customerStoreName, 'readonly');
            const store = transaction.objectStore(customerStoreName);
            const customerDropdown = document.getElementById('customer');
    
            // Clear any existing options and re-add the placeholder
            customerDropdown.innerHTML = '<option value="" disabled>Select a customer</option>';
    
            const customerCursorRequest = store.openCursor();
            customerCursorRequest.onsuccess = function(event) {
                const cursor = event.target.result;
                if (cursor) {
                    const customer = cursor.value;
                    const option = document.createElement('option');
                    option.value = customer.customer_id;
                    option.textContent = customer.name;
                    customerDropdown.appendChild(option);
                    cursor.continue();
                }
            };
    
            transaction.oncomplete = function () {
                if (inspectionData.customer_id) {
                    customerDropdown.value = inspectionData.customer_id;
                }
            };
        };
    
        request.onerror = function(event) {
            console.error("Error opening IndexedDB:", event);
        };
    };
    

    document.addEventListener('DOMContentLoaded', () => {
        populateFormData();

        // Save the updated inspection data when the form is submitted
        document.getElementById('inspectionForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevent default form submission

            const customer = document.getElementById('customer').value;
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const summary = document.getElementById('summary').value;
            const date = document.getElementById('date').value;
            const last_modified = new Date().toISOString();

            saveInspectionData(customer, title, description, summary, date, last_modified);
        });

function saveInspectionData(customer, title, description, summary, date, last_modified) {
    const inspectionData = JSON.parse(localStorage.getItem('edit_record'));
    const inspectionId = inspectionData.inspection_id;

    const updatedInspectionData = {
        inspection_id: inspectionId,
        customer_id: customer,
        title: title,
        description: description,
        summary: summary,
        date: date,
        last_modified: last_modified,
        // image_url will be added by upsert function if imageBlob exists
    };

    const fileInput = document.getElementById('img');
    let imageFile;
    if (change) {

        imageFile = fileInput.files[0];
    }

    // Case: user selected a new image
    if (change) {
        upsertInspectionWithImage('Inspection_Header', updatedInspectionData, imageFile)
            .then(() => {
                console.log('Inspection updated with image.');
                 window.location.href = "/inspections";
            })
            .catch((err) => {
                alert('Error saving inspection with image:', err);
            });
    } else {
        // Case: no image selected
        const inspectionData = JSON.parse(localStorage.getItem('edit_record')) || {};
        updatedInspectionData.image_url = inspectionData.image_url || '';
        upsertInspectionWithImage('Inspection_Header', updatedInspectionData, null)
            .then(() => {
                console.log('Inspection updated without changing image.');
                 window.location.href = "/inspections";
            })
            .catch((err) => {
                alert('Error saving inspection without image:', err);
            });
    }
}

    });


    /**
 * Up‑sert an inspection record and (optionally) a new image.
 *
 * @param {string}   storeName         – usually 'Inspections'
 * @param {Object}   record            – the inspection data (must include inspection_id)
 * @param {Blob=}    imageBlob         – new image to save; pass null/undefined to keep existing
 * @returns {Promise<void>}
 */
const upsertInspectionWithImage = (storeName, record, imageBlob) => {
    return new Promise((resolve, reject) => {
        if (!db) {
            reject('Database is not open.');
            return;
        }

        // Make sure we have a stable primary key
        if (!record.inspection_id) {
            record.inspection_id = crypto.randomUUID();
        }

        const transaction = db.transaction(['Images', storeName], 'readwrite');
        const imagesStore  = transaction.objectStore('Images');
        const dataStore    = transaction.objectStore(storeName);

        /**
         * Helper to finish by writing/over‑writing the main inspection record.
         * Uses put() so it updates if the key already exists, inserts otherwise.
         */
        const saveInspection = (finalRecord) => {
            const request = dataStore.put(finalRecord);
            request.onsuccess = () => resolve();
            request.onerror   = (evt) => reject(evt.target.error);
        };

        try {
            if (imageBlob) {
                // Create or replace the image linked to this inspection
                const imageRecord = { blob: imageBlob, inspection_id: record.inspection_id };
                const imgReq = imagesStore.put(imageRecord);   // put() acts as up‑sert

                imgReq.onsuccess = (evt) => {
                    // Use the auto‑incremented key returned by IndexedDB as a lightweight image URL
                    const imageId = evt.target.result;
                    saveInspection({ ...record, image_url: imageId });
                };

                imgReq.onerror = (evt) => reject(evt.target.error);
            } else {
                // No new image – keep whatever is already stored (if anything)
                saveInspection(record);
            }
        } catch (err) {
            transaction.abort();
            reject(`Transaction error: ${err}`);
        }
    });
};


    const confirmDelete = () => {
        const confirmation = prompt("Deleting this inspection will also remove all associated inspection details and revisions. Type 'confirm' to permanently delete this record:");

        if (confirmation === 'confirm') {
            const localStorage_id = JSON.parse(localStorage.getItem('edit_record')); 
            const inspection_id = localStorage_id.inspection_id;

            deleteRecord('Inspection_Header', inspection_id)
                .then(() => {
                    alert('Record deleted successfully!');
                    window.location.href = "/inspections";  // Redirect after delete
                })
                .catch((err) => {
                    console.error('Error deleting record:', err);
                    alert('Failed to delete record. Check console for details.');
                });
        } else {
            alert('Invalid Confirmation.');
        }
    };




    




</script>

<style>
    .form-container {
        padding: 20px;
        background-color: #f9f9f9;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        max-width: 1000px;
        min-width: 600px;
        margin: auto;
    }

    h2 {
        font-size: 24px;
        margin-bottom: 20px;
        color: #333;
    }

    .form-group {
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #333;
    }

    input, select, textarea {
        width: calc(100% - 16px);
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
        background-color: #fff;
    }

    textarea {
        resize: vertical;
    }

    .submit-btn {
        display: inline-block;
        background-color: #007bff;
        color: white;
        padding: 10px 15px;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        transition: background-color 0.3s ease;
    }

    .submit-btn:hover {
        background-color: #0056b3;
    }
    .delete-btn {
        background-color: #dc3545;
        color: white;
        padding: 10px 15px;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
        transition: background-color 0.3s ease;
        margin-top: 15px;
    }

    .delete-btn:hover {
        background-color: #c82333;
    }
</style>
{% endblock %}
