{% extends 'base.html' %}

{% block title %}Edit Inspection{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-card">
        <h2>Edit Inspection</h2>

        <button type="button" class="delete-btn" onclick="confirmDelete()">
            <i class="fas fa-trash-alt text-xs"></i> Delete Inspection
        </button>

        <form id="inspectionForm" method="POST">

            <div class="form-group">
                <label for="customer">Customer</label>
                <select id="customer" name="customer" required>
                    <option value="" disabled>Select a customer</option>
                </select>
            </div>

            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" required>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="3" required></textarea>
            </div>

            <div class="form-group">
                <label for="summary">Summary</label>
                <textarea id="summary" name="summary" rows="3" required></textarea>
            </div>

            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" required>
            </div>

            <div class="form-group">
                <label for="img">Update Image</label>
                <input type="file" id="img" name="img" accept="image/*">
                <img id="prefil" class="img-preview" alt="Current image">
            </div>

            <button type="submit" class="submit-btn">Save Changes</button>
        </form>
    </div>
</div>

<script src='/static/js/db.js'></script>
<script>
    let change = false;
    const dbName = "HV-storage";

    document.getElementById('img').addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (file) {
            change = true;
            const reader = new FileReader();
            reader.onload = e => { document.getElementById('prefil').src = e.target.result; };
            reader.readAsDataURL(file);
        }
    });

    const populateFormData = () => {
        const inspectionData = JSON.parse(localStorage.getItem('edit_record')) || {};
        document.getElementById('title').value = inspectionData.title || '';
        document.getElementById('description').value = inspectionData.description || '';
        document.getElementById('summary').value = inspectionData.summary || '';
        document.getElementById('date').value = inspectionData.date || '';

        const imgEle = document.getElementById('prefil');
        if (inspectionData.image_url) {
            if (typeof inspectionData.image_url === 'string' && inspectionData.image_url.includes('https')) {
                imgEle.src = inspectionData.image_url;
                imgEle.style.display = 'block';
            } else {
                renderImageByImageId(inspectionData.image_url, imgEle);
                imgEle.style.display = 'block';
            }
        }

        const request = indexedDB.open(dbName, 1);
        request.onsuccess = function(event) {
            const db = event.target.result;
            const transaction = db.transaction("Customer", 'readonly');
            const store = transaction.objectStore("Customer");
            const dropdown = document.getElementById('customer');
            dropdown.innerHTML = '<option value="" disabled>Select a customer</option>';
            const cursorRequest = store.openCursor();
            cursorRequest.onsuccess = function(event) {
                const cursor = event.target.result;
                if (cursor) {
                    const option = document.createElement('option');
                    option.value = cursor.value.customer_id;
                    option.textContent = cursor.value.name;
                    dropdown.appendChild(option);
                    cursor.continue();
                }
            };
            transaction.oncomplete = () => {
                if (inspectionData.customer_id) dropdown.value = inspectionData.customer_id;
            };
        };
    };

    document.addEventListener('DOMContentLoaded', () => {
        populateFormData();

        document.getElementById('inspectionForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const inspectionData = JSON.parse(localStorage.getItem('edit_record'));
            const updatedData = {
                inspection_id: inspectionData.inspection_id,
                customer_id: document.getElementById('customer').value,
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                summary: document.getElementById('summary').value,
                date: document.getElementById('date').value,
                last_modified: new Date().toISOString(),
            };

            if (change) {
                const imageFile = document.getElementById('img').files[0];
                upsertInspectionWithImage('Inspection_Header', updatedData, imageFile)
                    .then(() => { window.location.href = "/inspections"; })
                    .catch(err => alert('Error saving: ' + err));
            } else {
                updatedData.image_url = inspectionData.image_url || '';
                upsertInspectionWithImage('Inspection_Header', updatedData, null)
                    .then(() => { window.location.href = "/inspections"; })
                    .catch(err => alert('Error saving: ' + err));
            }
        });
    });

    const upsertInspectionWithImage = (storeName, record, imageBlob) => {
        return new Promise((resolve, reject) => {
            if (!db) return reject('Database is not open.');
            if (!record.inspection_id) record.inspection_id = crypto.randomUUID();
            const transaction = db.transaction(['Images', storeName], 'readwrite');
            const imagesStore = transaction.objectStore('Images');
            const dataStore = transaction.objectStore(storeName);
            const saveInspection = (finalRecord) => {
                const request = dataStore.put(finalRecord);
                request.onsuccess = () => resolve();
                request.onerror = evt => reject(evt.target.error);
            };
            try {
                if (imageBlob) {
                    const imgReq = imagesStore.put({ blob: imageBlob, inspection_id: record.inspection_id });
                    imgReq.onsuccess = evt => saveInspection({ ...record, image_url: evt.target.result });
                    imgReq.onerror = evt => reject(evt.target.error);
                } else {
                    saveInspection(record);
                }
            } catch (err) {
                transaction.abort();
                reject('Transaction error: ' + err);
            }
        });
    };

    const confirmDelete = () => {
        const confirmation = prompt("Deleting this inspection will also remove all associated details and revisions. Type 'confirm' to proceed:");
        if (confirmation === 'confirm') {
            const inspection_id = JSON.parse(localStorage.getItem('edit_record')).inspection_id;
            deleteRecord('Inspection_Header', inspection_id)
                .then(() => { alert('Deleted successfully!'); window.location.href = "/inspections"; })
                .catch(err => alert('Failed to delete: ' + err));
        } else {
            alert('Invalid confirmation.');
        }
    };
</script>
{% endblock %}
