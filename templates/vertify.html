<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HV Engineers | Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="/static/manifest.json">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen px-4">

    <div class="w-full max-w-sm">
        <!-- Logo / branding -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl shadow-lg mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">HV Engineers</h1>
            <p class="text-slate-500 text-sm mt-1">Inspection Management</p>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
            <h2 class="text-base font-bold text-slate-700 mb-4">Enter Access Code</h2>

            <div id="error" class="hidden mb-4 px-3 py-2.5 bg-red-50 border border-red-200 rounded-lg text-red-600 text-sm font-medium">
                Incorrect password. Please try again.
            </div>

            <form id="access-form" class="space-y-4">
                <input
                    type="password"
                    name="password"
                    placeholder="Access password"
                    required
                    autocomplete="current-password"
                    class="w-full px-4 py-3 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                >
                <button
                    type="submit"
                    class="w-full bg-blue-600 text-white font-semibold py-3 rounded-lg hover:bg-blue-700 active:bg-blue-800 transition text-sm"
                >
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('access-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const password = e.target.password.value;
            const res = await fetch('/api/init', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('auth_verified', 'true');
                window.location.replace('/');
            } else {
                document.getElementById('error').classList.remove('hidden');
            }
        });
    </script>

</body>
</html>
