{% extends 'base.html' %}

{% block title %}Add Revision{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-card">
        <h2>Add Revision</h2>

        <form action="/upload-revision" method="POST" enctype="multipart/form-data">

            <div class="form-group">
                <label for="customer">Inspection</label>
                <select id="customer" name="customer" required>
                    {% if inspections and inspections|length > 0 %}
                        {% for inspection in inspections %}
                            <option value="{{ inspection.inspection_id }}">{{ inspection.description }}</option>
                        {% endfor %}
                    {% else %}
                        <option disabled>No inspections available</option>
                    {% endif %}
                </select>
            </div>

            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" required>
            </div>

            <div class="form-group">
                <label for="status">Status</label>
                <textarea id="status" name="status" rows="2" required></textarea>
            </div>

            <div class="form-group">
                <label for="detail">Detail</label>
                <textarea id="detail" name="detail" rows="3" required></textarea>
            </div>

            <div class="form-group">
                <label for="issued_by">Issued By</label>
                <select id="issued_by" name="issued_by" required onchange="toggleCustomInput(this)">
                    <option value="" disabled selected>Select a person</option>
                    <option value="Person 1">Richard Troup</option>
                    <option value="Person 2">Person 2</option>
                    <option value="Person 3">Person 3</option>
                    <option value="Other">Other</option>
                </select>
                <input type="text" id="custom_issued_by" name="custom_issued_by" placeholder="Enter name" style="display:none; margin-top:10px;">
            </div>

            <button type="submit" class="submit-btn">Submit Revision</button>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('date').value = new Date().toISOString().split('T')[0];
    });

    function toggleCustomInput(select) {
        const customInput = document.getElementById('custom_issued_by');
        if (select.value === 'Other') {
            customInput.style.display = 'block';
            customInput.required = true;
        } else {
            customInput.style.display = 'none';
            customInput.required = false;
            customInput.value = '';
        }
    }
</script>
{% endblock %}
